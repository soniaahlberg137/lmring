name: "🐛 Bug Report"
description: "Report a bug to help us improve"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the form below.

  - type: dropdown
    id: package
    attributes:
      label: "Package"
      description: "Which package is affected?"
      options:
        - "apps/web"
        - "packages/ai-hub"
        - "packages/auth"
        - "packages/database"
        - "packages/env"
        - "packages/i18n"
        - "packages/model-depot"
        - "packages/storage"
        - "packages/theme"
        - "packages/ui"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: deployment-mode
    attributes:
      label: "Deployment Mode"
      options:
        - "SaaS"
        - "Self-hosted"
        - "Both"
        - "Not sure"

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "What happened? Include steps to reproduce if possible."
      placeholder: |
        What happened:

        Steps to reproduce:
        1. Go to '...'
        2. Click on '...'
        3. See error

        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment / Logs / Screenshots (Optional)"
      description: "Any helpful context: environment details, error logs, screenshots, etc."
      placeholder: |
        - Node.js: v24.x
        - Browser: Chrome / Safari / Firefox
        - OS: macOS / Windows / Linux
