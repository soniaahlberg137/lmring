name: "✨ Feature Request"
description: "Suggest a new feature or enhancement"
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Please describe your idea.

  - type: dropdown
    id: package
    attributes:
      label: "Related Package"
      description: "Which package should this feature be added to?"
      options:
        - "apps/web"
        - "packages/ai-hub"
        - "packages/auth"
        - "packages/database"
        - "packages/env"
        - "packages/i18n"
        - "packages/model-depot"
        - "packages/storage"
        - "packages/theme"
        - "packages/ui"
        - "New Package"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem / Use Case"
      description: "What problem does this solve? When would you use it?"
      placeholder: "As a user, I want to... because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution (Optional)"
      description: "How would you like this to work?"
      placeholder: "Describe your ideal solution or alternatives you've considered"
